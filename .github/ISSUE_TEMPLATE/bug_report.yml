name: Bug report
description: Report a problem with FujiyNotepad
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in the details below so it can be reproduced.
  - type: input
    id: version
    attributes:
      label: FujiyNotepad version
      description: See **Help ▸ About FujiyNotepad…**
      placeholder: e.g. 4.8.0
    validations:
      required: true
  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      description: Which download you are running.
      options:
        - x64
        - Arm64
        - x86
        - Not sure
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: e.g. Windows 11 23H2 (build 22631)
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do, and what happened?
      placeholder: |
        1. Open a … file
        2. …
        3. See …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
  - type: textarea
    id: crashlog
    attributes:
      label: Crash log (if the app closed unexpectedly)
      description: |
        FujiyNotepad writes unhandled exceptions to `%LOCALAPPDATA%\FujiyNotepad\crash.log`.
        If the app closed unexpectedly, paste the most recent entry here.
      render: text
  - type: input
    id: filesize
    attributes:
      label: File size / line count (if relevant)
      placeholder: e.g. 12 GB, ~50M lines
