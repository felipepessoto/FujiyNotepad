name: Feature request
description: Suggest an idea or enhancement for FujiyNotepad
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case or the pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like FujiyNotepad to do?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: markdown
    attributes:
      value: |
        **Scope note:** FujiyNotepad is a fast, **read-only viewer** focused on very large files.
        Text editing and multi-file / tabbed viewing are intentionally out of scope.
