name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    # WinUI 3 (Windows App SDK) targets net10.0-windows10.0.19041.0 and only builds on Windows.
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No actions/setup-dotnet: the windows runner image already ships a .NET 10 SDK, which global.json
      # (10.0.100, rollForward latestMinor) accepts. setup-dotnet always re-downloads the ~300 MB SDK, so
      # relying on the preinstalled one saves ~35s per job. (Re-add it if the image ever drops .NET 10.)
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore src/FujiyNotepad.WinUI.slnx

      # Builds the shared engine (FujiyNotepad.Core), the WinUI text-view logic library and its tests, and
      # the WinUI app as a managed (RID-agnostic) build. The publish RID is selected at publish time by the
      # per-architecture publish profiles (Properties/PublishProfiles/win-*.pubxml), so no -r is needed here.
      - name: Build
        run: dotnet build src/FujiyNotepad.WinUI.slnx --configuration Release --no-restore

      # Runs the solution's tests: the shared engine (FujiyNotepad.Core) tests and the WinUI text-view logic
      # tests (FujiyNotepad.WinUI.Logic, including the render-model tests). Both are plain .NET test projects,
      # so they run on the hosted runner. The WinUI app itself is not unit-tested here: Windows App SDK test
      # hosts can't start on headless GitHub-hosted runners, so all testable logic lives in the device-free
      # logic library. Coverage is collected with coverlet (already referenced by the test projects) and
      # published as a build artifact for inspection.
      - name: Test
        run: dotnet test src/FujiyNotepad.WinUI.slnx --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ${{ github.workspace }}/TestResults

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: ${{ github.workspace }}/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

