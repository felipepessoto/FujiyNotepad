name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    # WinUI 3 (Windows App SDK) targets net10.0-windows10.0.19041.0 and only builds on Windows.
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # No actions/setup-dotnet: the windows runner image already ships a .NET 10 SDK, which global.json
      # (10.0.100, rollForward latestMinor) accepts. setup-dotnet always re-downloads the ~300 MB SDK, so
      # relying on the preinstalled one saves ~35s per job. (Re-add it if the image ever drops .NET 10.)
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore src/FujiyNotepad.slnx

      # Builds the shared engine (FujiyNotepad.Core), the WinUI text-view logic library and its tests, and
      # the WinUI app as a managed (RID-agnostic) build. The publish RID is selected at publish time by the
      # per-architecture publish profiles (Properties/PublishProfiles/win-*.pubxml), so no -r is needed here.
      - name: Build
        run: dotnet build src/FujiyNotepad.slnx --configuration Release --no-restore

      # Runs the solution's tests: the shared engine (FujiyNotepad.Core) tests and the device-free view-logic
      # tests (FujiyNotepad.Presentation, including the render-model tests). Both are plain .NET test projects,
      # so they run on the hosted runner. The WinUI app itself is not unit-tested here: Windows App SDK test
      # hosts can't start on headless GitHub-hosted runners, so all testable logic lives in the device-free
      # logic library. Coverage is collected with coverlet (already referenced by the test projects).
      - name: Test
        run: dotnet test src/FujiyNotepad.slnx --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ${{ github.workspace }}/TestResults

      # ReportGenerator (the de-facto .NET coverage tool) merges the per-project cobertura files, scopes them to
      # the two production libraries, and emits a GitHub-flavoured markdown summary + a merged Cobertura. It runs
      # on the Windows runner; the popular gate action (irongut/CodeCoverageSummary) is Docker/Linux-only, so the
      # threshold gate stays a small inline script instead.
      - name: Coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.10
        with:
          reports: ${{ github.workspace }}/TestResults/**/coverage.cobertura.xml
          targetdir: ${{ github.workspace }}/coveragereport
          reporttypes: MarkdownSummaryGithub;Cobertura;HtmlInline
          assemblyfilters: +FujiyNotepad.Core;+FujiyNotepad.Presentation
          verbosity: Warning

      # Make the percentage visible: append ReportGenerator's summary to the run summary page.
      - name: Publish coverage to run summary
        if: always()
        shell: pwsh
        run: |
          $f = "${{ github.workspace }}/coveragereport/SummaryGithub.md"
          if ((Test-Path $f) -and $env:GITHUB_STEP_SUMMARY) { Get-Content $f | Add-Content $env:GITHUB_STEP_SUMMARY }

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ github.workspace }}/coveragereport
          if-no-files-found: warn

      # Gate: fail the build if a production library's line coverage drops below the floor (a safety net
      # against silent erosion; the libraries currently sit ~92.5%).
      - name: Coverage gate
        shell: pwsh
        run: ./scripts/check-coverage.ps1 -CoberturaFile "${{ github.workspace }}/coveragereport/Cobertura.xml" -Threshold 85

  # App-layer UI test. The build-and-test job above covers the engine and the device-free logic
  # libraries, but the WinUI app itself (XAML, menu wiring, canvas, pickers) has no unit tests because a
  # Windows App SDK host can't start headlessly. Instead we publish the real Native-AOT executable and drive
  # it through Windows UI Automation with the winapp CLI (installed by microsoft/setup-WinAppCli), asserting
  # the window/menus/status render and each feature's menu works without crashing. AOT on purpose: this app's
  # worst bugs (CsWinRT picker CCW, missing resources.pri) only reproduce in the published AOT build.
  ui-tests:
    name: UI tests
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-win-x64-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-win-x64-
            nuget-${{ runner.os }}-

      - name: Set up winapp CLI
        uses: microsoft/setup-WinAppCli@v0.1

      # Mirrors the release publish (Properties/PublishProfiles/win-x64.pubxml): self-contained Native AOT,
      # AOT linking via the runner's C++ toolchain. One arch (x64) is enough for the UI tests.
      - name: Publish app (Native AOT, x64)
        run: >
          dotnet publish src/FujiyNotepad.WinUI/FujiyNotepad.WinUI.csproj
          -c Release
          -p:Platform=x64
          -p:PublishProfile=win-x64
          -o publish/app

      - name: UI tests
        shell: pwsh
        run: ./scripts/ui-tests.ps1 -Exe "${{ github.workspace }}/publish/app/FujiyNotepad.WinUI.exe" -ArtifactDir "${{ github.workspace }}"

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-tests-failure
          path: ${{ github.workspace }}/ui-tests-failure.png
          if-no-files-found: ignore

