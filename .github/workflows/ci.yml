name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    # WinUI 3 (Windows App SDK) targets net10.0-windows10.0.19041.0 and only builds on Windows.
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No actions/setup-dotnet: the windows runner image already ships a .NET 10 SDK, which global.json
      # (10.0.100, rollForward latestMinor) accepts. setup-dotnet always re-downloads the ~300 MB SDK, so
      # relying on the preinstalled one saves ~35s per job. (Re-add it if the image ever drops .NET 10.)
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore src/FujiyNotepad.WinUI.slnx

      # Builds the shared engine (FujiyNotepad.Core), the WinUI text-view logic library and its tests, and
      # the WinUI app as a managed (RID-agnostic) build. The publish RID is selected at publish time by the
      # per-architecture publish profiles (Properties/PublishProfiles/win-*.pubxml), so no -r is needed here.
      - name: Build
        run: dotnet build src/FujiyNotepad.WinUI.slnx --configuration Release --no-restore

      # Runs the solution's tests: the shared engine (FujiyNotepad.Core) tests and the WinUI text-view logic
      # tests (FujiyNotepad.Presentation, including the render-model tests). Both are plain .NET test projects,
      # so they run on the hosted runner. The WinUI app itself is not unit-tested here: Windows App SDK test
      # hosts can't start on headless GitHub-hosted runners, so all testable logic lives in the device-free
      # logic library. Coverage is collected with coverlet (already referenced by the test projects) and
      # published as a build artifact for inspection.
      - name: Test
        run: dotnet test src/FujiyNotepad.WinUI.slnx --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ${{ github.workspace }}/TestResults

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: ${{ github.workspace }}/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

  # App-layer UI smoke test. The build-and-test job above covers the engine and the device-free logic
  # libraries, but the WinUI app itself (XAML, menu wiring, canvas, pickers) has no unit tests because a
  # Windows App SDK host can't start headlessly. Instead we publish the real Native-AOT executable and drive
  # it through Windows UI Automation with the winapp CLI (installed by microsoft/setup-WinAppCli), asserting
  # the window/menus/status render and Find works without crashing. AOT on purpose: this app's worst bugs
  # (CsWinRT picker CCW, missing resources.pri) only reproduce in the published AOT build.
  ui-smoke:
    name: UI smoke
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-win-x64-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-win-x64-
            nuget-${{ runner.os }}-

      - name: Set up winapp CLI
        uses: microsoft/setup-WinAppCli@v0.1

      # Mirrors the release publish (Properties/PublishProfiles/win-x64.pubxml): self-contained Native AOT,
      # AOT linking via the runner's C++ toolchain. One arch (x64) is enough for a smoke test.
      - name: Publish app (Native AOT, x64)
        run: >
          dotnet publish src/FujiyNotepad.WinUI/FujiyNotepad.WinUI.csproj
          -c Release
          -p:Platform=x64
          -p:PublishProfile=win-x64
          -o publish/app

      - name: UI smoke test
        shell: pwsh
        run: ./scripts/ui-smoke.ps1 -Exe "${{ github.workspace }}/publish/app/FujiyNotepad.WinUI.exe" -ArtifactDir "${{ github.workspace }}"

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-failure
          path: ${{ github.workspace }}/ui-smoke-failure.png
          if-no-files-found: ignore

