name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual dry-run: builds and uploads the AOT artifacts for every architecture without creating a
  # GitHub Release. Useful for verifying the multi-arch Native AOT publish on the runners before tagging.
  workflow_dispatch:

permissions:
  contents: write   # required to create the GitHub Release and upload assets

jobs:
  test:
    name: Test
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test src/FujiyNotepad.WinUI.slnx --configuration Release

  build:
    name: Publish ${{ matrix.rid }}${{ matrix.suffix }}
    needs: test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Self-contained Native AOT (no prerequisites). x64/x86 build on the x64 image; arm64 builds
          # natively on the Windows-on-Arm image, so AOT needs no x64 -> arm64 cross-compilation.
          - { rid: win-x64,   platform: x64,   os: windows-latest, kind: selfcontained, suffix: "" }
          - { rid: win-x86,   platform: x86,   os: windows-latest, kind: selfcontained, suffix: "" }
          - { rid: win-arm64, platform: ARM64, os: windows-11-arm,  kind: selfcontained, suffix: "" }
          # Framework-dependent (small): needs the .NET 10 runtime + Windows App SDK runtime installed.
          # No AOT, so all three build on the x64 image.
          - { rid: win-x64,   platform: x64,   os: windows-latest, kind: framework, suffix: "-framework-dependent" }
          - { rid: win-x86,   platform: x86,   os: windows-latest, kind: framework, suffix: "-framework-dependent" }
          - { rid: win-arm64, platform: ARM64, os: windows-latest, kind: framework, suffix: "-framework-dependent" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          # On a tag push, ref_name is the tag (e.g. v1.2.3); on a manual dry-run it is the branch.
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}".TrimStart('v') } else { "0.0.0-dev" }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # Self-contained Native AOT: native code that bundles the .NET runtime AND the Windows App SDK, so
      # this download has no prerequisites. The publish profile selects the RID + self-contained publish;
      # -p:Platform keeps RID resolution consistent. AOT linking uses the runner's C++ toolchain.
      - name: Publish (self-contained Native AOT)
        if: matrix.kind == 'selfcontained'
        run: >
          dotnet publish src/FujiyNotepad.WinUI/FujiyNotepad.WinUI.csproj
          -c Release
          -p:Platform=${{ matrix.platform }}
          -p:PublishProfile=${{ matrix.rid }}
          -p:Version=${{ steps.version.outputs.version }}
          -o publish/app

      # Framework-dependent: a small download for users who already have the .NET 10 runtime and the
      # Windows App SDK runtime installed. Nothing is bundled (no AOT / trim / R2R), and the unused
      # Windows-AI components (~40 MB) are stripped via ExcludeWindowsAiComponents.
      - name: Publish (framework-dependent)
        if: matrix.kind == 'framework'
        run: >
          dotnet publish src/FujiyNotepad.WinUI/FujiyNotepad.WinUI.csproj
          -c Release
          -p:Platform=${{ matrix.platform }}
          -r ${{ matrix.rid }}
          --self-contained false
          -p:PublishAot=false
          -p:WindowsAppSDKSelfContained=false
          -p:PublishReadyToRun=false
          -p:PublishTrimmed=false
          -p:ExcludeWindowsAiComponents=true
          -p:Version=${{ steps.version.outputs.version }}
          -o publish/app

      # End users don't need debug symbols, and the self-contained Native AOT .pdb is ~34 MB. ILC writes
      # it straight into the output (it isn't a normal publish item, so MSBuild properties/targets can't
      # drop it), so strip every .pdb from the published folder here — for both flavors.
      - name: Strip debug symbols
        shell: pwsh
        run: Get-ChildItem publish/app -Recurse -Filter *.pdb | Remove-Item -Force

      - name: Package
        id: package
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zip = "dist/FujiyNotepad-$v-${{ matrix.rid }}${{ matrix.suffix }}.zip"
          Compress-Archive -Path publish/app/* -DestinationPath $zip -Force
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # Always uploaded (including on the manual dry-run) so each build can be inspected without a release.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FujiyNotepad-${{ matrix.rid }}${{ matrix.suffix }}
          path: ${{ steps.package.outputs.zip }}

  release:
    name: Create GitHub Release
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}" artifacts/*.zip
          --repo ${{ github.repository }}
          --title "FujiyNotepad ${{ github.ref_name }}"
          --generate-notes
