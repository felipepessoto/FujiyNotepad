name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release and upload assets

jobs:
  release:
    name: Publish & Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Test
        run: dotnet test src/FujiyNotepad.sln --configuration Release

      - name: Publish self-contained (no .NET install required)
        run: >
          dotnet publish src/FujiyNotepad.UI/FujiyNotepad.UI.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishReadyToRun=true
          -p:Version=${{ steps.version.outputs.version }}
          -o publish/self-contained

      # No ReadyToRun for the framework-dependent build: an R2R image is tied to the exact runtime
      # version it was crossgen'd against, so it can fail (coreclr fail-fast, 0xC0000602) on a machine
      # whose installed .NET runtime patch differs from the build runner's. Plain IL stays portable
      # and is JIT-compiled against whatever .NET 10 runtime the user has. (Self-contained keeps R2R
      # because it ships its own matching runtime.)
      - name: Publish framework-dependent (requires the .NET 10 Desktop Runtime)
        run: >
          dotnet publish src/FujiyNotepad.UI/FujiyNotepad.UI.csproj
          -c Release -r win-x64 --self-contained false
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.version }}
          -o publish/framework-dependent

      - name: Stage release assets
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          # Only the single .exe from each variant (skip the .pdb).
          Copy-Item publish/self-contained/FujiyNotepad.UI.exe "dist/FujiyNotepad-$v-win-x64-self-contained.exe"
          Copy-Item publish/framework-dependent/FujiyNotepad.UI.exe "dist/FujiyNotepad-$v-win-x64.exe"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem dist/*.exe | ForEach-Object { $_.FullName }
          gh release create "${{ github.ref_name }}" $assets `
            --title "FujiyNotepad ${{ github.ref_name }}" `
            --generate-notes
