name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual dry-run: builds and uploads the AOT artifact without creating a GitHub Release.
  # Useful for verifying the Native AOT publish on the runner before tagging.
  workflow_dispatch:

permissions:
  contents: write   # required to create the GitHub Release and upload assets

jobs:
  release:
    name: Publish & Release
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          # On a tag push, ref_name is the tag (e.g. v1.2.3); on a manual dry-run it is the branch.
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}".TrimStart('v') } else { "0.0.0-dev" }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Test
        run: dotnet test src/FujiyNotepad.WinUI.slnx --configuration Release

      # Native AOT (PublishAot=true in the WinUI csproj) compiles the app to native code: smaller, faster
      # startup, no JIT, and no .NET runtime to install. WindowsAppSDKSelfContained bundles the Windows App
      # SDK runtime so the unpackaged app needs no separate runtime install — the produced folder is fully
      # standalone. AOT linking uses the hosted runner's C++ toolchain.
      - name: Publish (Native AOT, self-contained)
        run: >
          dotnet publish src/FujiyNotepad.WinUI/FujiyNotepad.WinUI.csproj
          -c Release -r win-x64
          -p:WindowsAppSDKSelfContained=true
          -p:Version=${{ steps.version.outputs.version }}
          -o publish/app

      - name: Package
        id: package
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zip = "dist/FujiyNotepad-$v-win-x64.zip"
          Compress-Archive -Path publish/app/* -DestinationPath $zip -Force
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # Always uploaded (including on the manual dry-run) so the AOT build can be inspected without a release.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FujiyNotepad-win-x64
          path: ${{ steps.package.outputs.zip }}

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" "${{ steps.package.outputs.zip }}" `
            --title "FujiyNotepad ${{ github.ref_name }}" `
            --generate-notes
