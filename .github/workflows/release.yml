name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual dry-run: builds and uploads the AOT artifacts for every architecture without creating a
  # GitHub Release. Useful for verifying the multi-arch Native AOT publish on the runners before tagging.
  workflow_dispatch:

permissions:
  contents: write   # required to create the GitHub Release and upload assets

jobs:
  test:
    name: Test
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Test
        run: dotnet test src/FujiyNotepad.WinUI.slnx --configuration Release

  build:
    name: Publish ${{ matrix.rid }}
    # Not gated on `test`: the AOT publishes run in parallel with the Test job to shorten the release
    # critical path. The final `release` job below still requires BOTH `test` and `build` to succeed.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # x64 and x86 are built on the x64 image; arm64 is built natively on the Windows-on-Arm
          # image, so Native AOT needs no x64 -> arm64 cross-compilation.
          - rid: win-x64
            platform: x64
            os: windows-latest
          - rid: win-x86
            platform: x86
            os: windows-latest
          - rid: win-arm64
            platform: ARM64
            os: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Cache the global NuGet package folder per architecture (self-contained AOT restores arch-specific
      # runtime packs). On a miss it restores from nuget.org as before.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ matrix.rid }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-${{ matrix.rid }}-
            nuget-${{ runner.os }}-

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          # On a tag push, ref_name is the tag (e.g. v1.2.3); on a manual dry-run it is the branch.
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}".TrimStart('v') } else { "0.0.0-dev" }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # Native AOT (PublishAot=true in the WinUI csproj) compiles the app to native code: smaller, faster
      # startup, no JIT, and no .NET runtime to install. The app's publish profile
      # (Properties/PublishProfiles/win-<rid>.pubxml) selects the RID and a self-contained publish; passing
      # -p:Platform keeps the RID resolution consistent. WindowsAppSDKSelfContained bundles the Windows App
      # SDK, so each unpackaged build is fully standalone. AOT linking uses the runner's C++ toolchain.
      - name: Publish (Native AOT, self-contained)
        run: >
          dotnet publish src/FujiyNotepad.WinUI/FujiyNotepad.WinUI.csproj
          -c Release
          -p:Platform=${{ matrix.platform }}
          -p:PublishProfile=${{ matrix.rid }}
          -p:Version=${{ steps.version.outputs.version }}
          -o publish/app

      # Prune optional Windows App SDK components and debug symbols this text viewer never loads, to
      # shrink the download. Validated: the app still launches, opens, searches and renders without them.
      #   * Native AOT *.pdb (~31 MB) - ILC writes it straight to the output, bypassing MSBuild, so we
      #     delete it here rather than from the project file.
      #   * Unused SDK libraries (~50 MB): Windows AI (onnxruntime / DirectML / Microsoft.Windows.AI.*),
      #     WebView2, widgets, push notifications, workloads, perception/NPU, imaging, the XAML designer,
      #     phone controls, and the background-task host.
      #   * Non-English UI resources: keep only the en-US *.mui folder. en-US is the framework's ultimate
      #     fallback language, so every other Windows display language resolves to it (confirmed with the
      #     GetFileMUIPath loader API) and non-English systems still run. Removing *every* language folder,
      #     including en-US, instead crashes startup with ERROR_MRM_NO_CANDIDATE / 0x80073B01.
      - name: Remove unused files
        shell: pwsh
        run: |
          $unused = @(
            'onnxruntime.dll', 'DirectML.dll', 'Microsoft.ML.OnnxRuntime.dll',
            'Microsoft.Web.WebView2.Core.dll', 'WebView2Loader.dll',
            'Microsoft.Windows.Widgets.dll', 'PerceptiveStreaming.dll', 'NPUDetect.dll',
            'PushNotificationsLongRunningTask.ProxyStub.dll',
            'Microsoft.UI.Xaml.Phone.dll', 'Microsoft.UI.Designer.dll', 'Microsoft.Graphics.Imaging.dll',
            'Microsoft.Windows.ApplicationModel.Background.UniversalBGTask.dll',
            'Microsoft.Windows.Workloads.dll', 'Microsoft.Windows.Workloads.Resources.dll', 'Microsoft.Windows.Workloads.Resources_ec.dll'
          )
          Get-ChildItem publish/app -Recurse -File | Where-Object {
            $_.Extension -eq '.pdb' -or $_.Name -in $unused -or
            $_.Name -like 'Microsoft.Windows.AI.*' -or
            $_.Name -like 'workloads.*'
          } | Remove-Item -Force

          # Keep only the en-US localization: it is the Windows App SDK's ultimate fallback language, so
          # every other display language resolves to it. (-ne is case-insensitive, so an 'en-US' folder
          # would be kept too.) Language folders are the ones that contain *.mui files.
          Get-ChildItem publish/app -Directory | Where-Object {
            $_.Name -ne 'en-US' -and (Get-ChildItem $_.FullName -Filter '*.mui' -File -ErrorAction SilentlyContinue)
          } | Remove-Item -Recurse -Force

      - name: Package
        id: package
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zip = "dist/FujiyNotepad-$v-${{ matrix.rid }}.zip"
          Compress-Archive -Path publish/app/* -DestinationPath $zip -Force
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # Always uploaded (including on the manual dry-run) so each AOT build can be inspected without a release.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FujiyNotepad-${{ matrix.rid }}
          path: ${{ steps.package.outputs.zip }}

  release:
    name: Create GitHub Release
    needs: [build, test]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}" artifacts/*.zip
          --repo ${{ github.repository }}
          --title "FujiyNotepad ${{ github.ref_name }}"
          --generate-notes
